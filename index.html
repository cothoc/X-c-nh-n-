<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #ddd; padding: 20px; }
        .editor { width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #phieu { width: 800px; background: white; margin: 20px auto; padding: 30px; border: 1px solid #999; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #ccc; padding: 8px; }
        .blue-header { background: #5398b1; color: white; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="editor">
    <h3>Nhập thông tin phiếu (Đầy đủ):</h3>
    <div class="grid">
        <input type="text" id="i_hotel" placeholder="Tên khách sạn">
        <input type="text" id="i_name" placeholder="Họ tên khách">
        <input type="text" id="i_phone" placeholder="SĐT">
        <input type="text" id="i_in" placeholder="Ngày nhận">
        <input type="text" id="i_out" placeholder="Ngày trả">
        <input type="text" id="i_room" placeholder="Loại phòng">
        <input type="text" id="i_price" placeholder="Tiền phòng">
        <input type="text" id="i_bank" placeholder="Ngân hàng">
        <input type="text" id="i_acc" placeholder="Số tài khoản">
        <button onclick="update()">Cập nhật phiếu</button>
        <button onclick="save()" style="background:#5398b1; color:white;">SAO CHÉP ẢNH</button>
    </div>
</div>

<div id="phieu">
    <h2 id="o_hotel" style="text-align:center;">TÊN KHÁCH SẠN</h2>
    <h3 style="text-align:center;">PHIẾU XÁC NHẬN ĐẶT PHÒNG</h3>
    <table>
        <tr><td colspan="2" class="blue-header">THÔNG TIN ĐẶT PHÒNG</td></tr>
        <tr><td>Họ tên: <b id="o_name">...</b></td><td>SĐT: <b id="o_phone">...</b></td></tr>
        <tr><td>Ngày nhận: <b id="o_in">...</b></td><td>Ngày trả: <b id="o_out">...</b></td></tr>
        <tr><td>Loại phòng: <b id="o_room">...</b></td><td>Tiền phòng: <b id="o_price">...</b></td></tr>
        <tr><td colspan="2" class="blue-header">THÔNG TIN NGÂN HÀNG</td></tr>
        <tr><td>Ngân hàng: <b id="o_bank">...</b></td><td>STK: <b id="o_acc">...</b></td></tr>
    </table>
</div>

<script>
    function update() {
        document.getElementById('o_hotel').innerText = document.getElementById('i_hotel').value;
        document.getElementById('o_name').innerText = document.getElementById('i_name').value;
        document.getElementById('o_phone').innerText = document.getElementById('i_phone').value;
        document.getElementById('o_in').innerText = document.getElementById('i_in').value;
        document.getElementById('o_out').innerText = document.getElementById('i_out').value;
        document.getElementById('o_room').innerText = document.getElementById('i_room').value;
        document.getElementById('o_price').innerText = document.getElementById('i_price').value;
        document.getElementById('o_bank').innerText = document.getElementById('i_bank').value;
        document.getElementById('o_acc').innerText = document.getElementById('i_acc').value;
    }
    function save() {
        html2canvas(document.querySelector("#phieu")).then(c => {
            c.toBlob(b => { navigator.clipboard.write([new ClipboardItem({"image/png": b})]); alert("Đã copy ảnh!"); });
        });
    }
</script>
</body>
</html>
