<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .controls { background: white; padding: 20px; width: 800px; margin: auto; border-radius: 10px; }
        #phieu { width: 800px; background: white; margin: 20px auto; padding: 20px; border: 2px solid #5398b1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #ccc; padding: 10px; }
        .header-blue { background: #5398b1; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Nhập thông tin:</h3>
    <input type="text" id="hoTen" placeholder="Họ tên" oninput="update()">
    <input type="text" id="ngayNhan" placeholder="Ngày nhận" oninput="update()">
    <button onclick="copyImg()">Sao chép thành ảnh</button>
</div>

<div id="phieu">
    <h2 style="text-align:center;">THƯ XÁC NHẬN ĐẶT PHÒNG</h2>
    <table>
        <tr><td colspan="2" class="header-blue">THÔNG TIN ĐẶT PHÒNG</td></tr>
        <tr><td>Họ & Tên: <b id="outTen">...</b></td><td>Ngày nhận: <b id="outNhan">...</b></td></tr>
    </table>
</div>

<script>
    function update() {
        document.getElementById('outTen').innerText = document.getElementById('hoTen').value;
        document.getElementById('outNhan').innerText = document.getElementById('ngayNhan').value;
    }
    function copyImg() {
        html2canvas(document.querySelector("#phieu")).then(c => {
            c.toBlob(b => { navigator.clipboard.write([new ClipboardItem({"image/png": b})]); alert("Đã copy!"); });
        });
    }
</script>
</body>
</html>
