<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .controls { background: white; padding: 20px; width: 800px; margin: 0 auto 20px auto; border-radius: 8px; border: 1px solid #ddd; }
        #phieu { width: 800px; background: white; margin: 0 auto; padding: 30px; border: 2px solid #5398b1; box-sizing: border-box; }
        
        /* Bố cục bảng giống mẫu */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { border: 1px solid #ccc; padding: 12px; vertical-align: top; }
        .header-section { background: #5398b1; color: white; text-align: center; font-weight: bold; padding: 10px; }
        
        .title-hotel { text-align: center; color: #2c3e50; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .title-confirm { text-align: center; color: #2c3e50; font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Nhập liệu thông tin:</h3>
    <input type="text" id="inHoTen" placeholder="Họ tên khách" oninput="up()">
    <input type="text" id="inPhone" placeholder="Số điện thoại" oninput="up()">
    <input type="text" id="inNhan" placeholder="Ngày nhận" oninput="up()">
    <input type="text" id="inTra" placeholder="Ngày trả" oninput="up()">
    <input type="text" id="inLoai" placeholder="Loại phòng" oninput="up()">
    <input type="text" id="inTien" placeholder="Tiền phòng" oninput="up()">
    <button onclick="capture()" style="background:#28a745; color:white; padding:10px; border:none; cursor:pointer;">Sao chép phiếu (Ảnh)</button>
</div>

<div id="phieu">
    <div class="title-hotel">AQUAMARINE RESORT CAM RANH</div>
    <div class="title-confirm">THƯ XÁC NHẬN ĐẶT PHÒNG</div>
    
    <table>
        <tr><td colspan="2" class="header-section">THÔNG TIN ĐẶT PHÒNG</td></tr>
        <tr><td>Họ & Tên: <b id="outHoTen">...</b></td><td>Số điện thoại: <b id="outPhone">...</b></td></tr>
        <tr><td>Ngày nhận: <b id="outNhan">...</b></td><td>Ngày trả: <b id="outTra">...</b></td></tr>
        <tr><td>Loại phòng: <b id="outLoai">...</b></td><td>Tiền phòng: <b id="outTien">...</b></td></tr>
    </table>
</div>

<script>
    function up() {
        document.getElementById('outHoTen').innerText = document.getElementById('inHoTen').value;
        document.getElementById('outPhone').innerText = document.getElementById('inPhone').value;
        document.getElementById('outNhan').innerText = document.getElementById('inNhan').value;
        document.getElementById('outTra').innerText = document.getElementById('inTra').value;
        document.getElementById('outLoai').innerText = document.getElementById('inLoai').value;
        document.getElementById('outTien').innerText = document.getElementById('inTien').value;
    }
    function capture() {
        html2canvas(document.querySelector("#phieu")).then(c => {
            c.toBlob(b => { 
                navigator.clipboard.write([new ClipboardItem({"image/png": b})]); 
                alert("Đã sao chép! Bạn dán vào Zalo là có hình ảnh phiếu ngay."); 
            });
        });
    }
</script>
</body>
</html>
