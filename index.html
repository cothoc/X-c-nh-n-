<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef; padding: 20px; }
        .controls { background: #fff; padding: 20px; width: 800px; margin: auto; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 45%; padding: 8px; margin: 5px 0; }
        button { padding: 10px 20px; background: #5398b1; color: white; border: none; cursor: pointer; }
        
        #phieu { width: 800px; background: white; margin: 20px auto; padding: 20px; border: 2px solid #5398b1; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #ccc; padding: 10px; }
        .header-blue { background: #5398b1; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Nhập thông tin phiếu:</h3>
    <input type="text" id="inHoTen" placeholder="Họ tên khách" oninput="up()">
    <input type="text" id="inPhone" placeholder="Số điện thoại" oninput="up()">
    <input type="text" id="inNhan" placeholder="Ngày nhận" oninput="up()">
    <input type="text" id="inTra" placeholder="Ngày trả" oninput="up()">
    <input type="text" id="inLoai" placeholder="Loại phòng" oninput="up()">
    <input type="text" id="inTien" placeholder="Tiền phòng" oninput="up()">
    <br><button onclick="capture()">Sao chép thành ảnh</button>
</div>

<div id="phieu">
    <h2 style="text-align:center; color:#5398b1;">PHIẾU XÁC NHẬN ĐẶT PHÒNG</h2>
    <table>
        <tr><td colspan="2" class="header-blue">THÔNG TIN ĐẶT PHÒNG</td></tr>
        <tr><td>Họ & Tên: <b id="outHoTen">...</b></td><td>Số ĐT: <b id="outPhone">...</b></td></tr>
        <tr><td>Ngày nhận: <b id="outNhan">...</b></td><td>Ngày trả: <b id="outTra">...</b></td></tr>
        <tr><td>Loại phòng: <b id="outLoai">...</b></td><td>Tiền phòng: <b id="outTien">...</b></td></tr>
    </table>
</div>

<script>
    function up() {
        document.getElementById('outHoTen').innerText = document.getElementById('inHoTen').value;
        document.getElementById('outPhone').innerText = document.getElementById('inPhone').value;
        document.getElementById('outNhan').innerText = document.getElementById('inNhan').value;
        document.getElementById('outTra').innerText = document.getElementById('inTra').value;
        document.getElementById('outLoai').innerText = document.getElementById('inLoai').value;
        document.getElementById('outTien').innerText = document.getElementById('inTien').value;
    }
    function capture() {
        html2canvas(document.querySelector("#phieu")).then(c => {
            c.toBlob(b => { navigator.clipboard.write([new ClipboardItem({"image/png": b})]); alert("Đã sao chép! Dán vào Zalo là xong."); });
        });
    }
</script>
</body>
</html>
