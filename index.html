<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .controls { background: white; padding: 20px; width: 850px; margin: auto; border-radius: 8px; border: 1px solid #ddd; }
        .hotel-form { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        input { padding: 8px; }
        #phieu { width: 850px; background: white; margin: 20px auto; padding: 30px; border: 1px solid #ccc; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { border: 1px solid #ccc; padding: 10px; }
        .blue-bg { background: #5398b1; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Chọn khách sạn:</h3>
    <button onclick="switchHotel('cicilia')">Cicilia Danang</button>
    <button onclick="switchHotel('aqua')">Aquamarine Cam Ranh</button>

    <div id="form-cicilia" class="hotel-form">
        <input type="text" id="c_ten" placeholder="Họ tên" oninput="up('cicilia')">
        <input type="text" id="c_sdt" placeholder="SĐT" oninput="up('cicilia')">
        <input type="text" id="c_ngay" placeholder="Ngày nhận" oninput="up('cicilia')">
        <input type="text" id="c_tien" placeholder="Tiền phòng" oninput="up('cicilia')">
    </div>

    <div id="form-aqua" class="hotel-form">
        <input type="text" id="a_ten" placeholder="Họ tên" oninput="up('aqua')">
        <input type="text" id="a_loai" placeholder="Loại phòng" oninput="up('aqua')">
        <input type="text" id="a_ngay" placeholder="Ngày trả" oninput="up('aqua')">
    </div>
    
    <button onclick="copyImg()" style="margin-top:20px; background:green; color:white; border:none; padding:10px;">SAO CHÉP PHIẾU</button>
</div>

<div id="phieu">
    <h2 id="o_tieuDe">PHIẾU XÁC NHẬN</h2>
    <table id="o_table">
        </table>
</div>

<script>
    function switchHotel(type) {
        document.querySelectorAll('.hotel-form').forEach(f => f.style.display = 'none');
        document.getElementById('form-' + type).style.display = 'grid';
        document.getElementById('phieu').style.display = 'block';
        // Logic hiển thị bảng tương ứng ở đây...
    }
    
    function up(type) {
        // Cập nhật nội dung vào phiếu dựa trên loại khách sạn
    }

    function copyImg() {
        html2canvas(document.querySelector("#phieu")).then(c => {
            c.toBlob(b => { navigator.clipboard.write([new ClipboardItem({"image/png": b})]); alert("Đã sao chép ảnh!"); });
        });
    }
</script>
</body>
</html>
